name: Publish
on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: heavy-2
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm validate
      - run: pnpm -r publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Redeploy all Coolify projects
        if: success()
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          CACHE_BUST=$(date +%s)
          UUIDS=$(curl -sf "$COOLIFY_URL/api/v1/applications" \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            | jq -r '.[] | select(.name | endswith("-voice-agent")) | .uuid')
          for UUID in $UUIDS; do
            curl -sf -X PATCH "$COOLIFY_URL/api/v1/applications/$UUID/envs" \
              -H "Authorization: Bearer $COOLIFY_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"key\": \"NPM_CACHE_BUST\", \"value\": \"$CACHE_BUST\"}" > /dev/null 2>&1 || true
            curl -sf -X POST "$COOLIFY_URL/api/v1/deploy" \
              -H "Authorization: Bearer $COOLIFY_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"uuid\": \"$UUID\"}" > /dev/null 2>&1 && echo "Deployed $UUID" || echo "Failed $UUID"
          done
